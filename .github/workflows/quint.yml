name: Quint Model Checking

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quint:
    name: Verify Quint specifications
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Verify Quint specifications
        run: npm run quint:verify
