name: Quint Model Checking

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quint:
    name: Verify Quint specifications
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Verify Quint specifications
        run: npm run quint:verify

      - name: Upload Apalache output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: apalache-output
          path: _apalache-out/
          if-no-files-found: ignore
